<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tokyo Master Itinerary Builder</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,800;1,600&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --bg-color: #fdfbf7;
            --primary: #C8102E;
            --primary-hover: #a00d24;
            --success: #2e7d32;
            --text-main: #1D232A;
            --text-muted: #4a5568;
            --accent-yellow: #f2c94c;
            --accent-pink: #ffb7b2;
            --card-bg: #ffffff;
            
            --block-shadow: 6px 6px 0px var(--text-main);
            --block-shadow-hover: 8px 8px 0px var(--text-main);
            --transition-spring: cubic-bezier(0.25, 1, 0.5, 1);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(var(--text-muted) 0.5px, transparent 0.5px);
            background-size: 24px 24px;
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1, h2, h3, h4 {
            font-family: 'Playfair Display', serif;
            color: var(--text-main);
            margin-top: 0;
        }

        h1 {
            text-align: center;
            font-size: 3.5rem;
            color: var(--primary);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 3px 3px 0px rgba(29, 35, 42, 0.1);
        }

        .subtitle {
            text-align: center;
            font-weight: 500;
            color: var(--text-main);
            margin-bottom: 40px;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        /* Tabs Styling */
        .tabs {
            display: flex;
            background: var(--card-bg);
            border: 2px solid var(--text-main);
            box-shadow: var(--block-shadow);
            margin-bottom: 40px;
            flex-wrap: wrap;
            position: relative;
            z-index: 10;
        }

        .tab-btn {
            flex: 1 1 auto;
            padding: 15px 10px;
            text-align: center;
            background: none;
            border: none;
            border-right: 2px solid var(--text-main);
            border-bottom: 2px solid transparent;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s var(--transition-spring);
        }

        .tab-btn:last-child { border-right: none; }
        
        .tab-btn.tab-finalize {
            background-color: var(--accent-yellow);
            color: var(--text-main);
        }

        .tab-btn:hover {
            background-color: var(--text-main);
            color: var(--card-bg);
        }

        .tab-btn.active {
            color: var(--card-bg);
            background-color: var(--text-main);
            border-bottom: 2px solid var(--card-bg);
        }

        .tab-btn.tab-finalize.active {
            background-color: var(--primary);
            border-bottom-color: var(--primary);
        }

        /* Grid Layout for Cards */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            padding-bottom: 50px;
            perspective: 1000px;
            animation: slideFadeIn 0.5s var(--transition-spring) forwards;
        }

        @keyframes slideFadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Card Styling */
        .card {
            background: var(--card-bg);
            border: 2px solid var(--text-main);
            padding: 20px;
            box-shadow: var(--block-shadow);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s var(--transition-spring), box-shadow 0.3s var(--transition-spring);
            position: relative;
        }

        .card:hover {
            transform: translate(-3px, -3px);
            box-shadow: var(--block-shadow-hover);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 10px;
        }

        .card h3 {
            font-size: 1.3rem;
            margin: 0;
            line-height: 1.3;
        }

        .card p {
            margin: 0 0 15px 0;
            font-size: 0.95rem;
            flex-grow: 1;
        }

        /* Add Button */
        .add-btn {
            background: var(--card-bg);
            border: 2px solid var(--text-main);
            color: var(--text-main);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .add-btn:hover {
            background: var(--text-main);
            color: var(--card-bg);
        }

        .card.selected {
            border-color: var(--success);
            box-shadow: 6px 6px 0px var(--success);
        }
        
        .card.selected:hover {
            box-shadow: 8px 8px 0px var(--success);
        }

        .card.selected .add-btn {
            background: var(--success);
            border-color: var(--success);
            color: white;
            transform: scale(1.1);
        }

        .map-thumbnail {
            width: 100%;
            height: 150px;
            border: 2px solid var(--text-main);
            background-color: var(--accent-pink);
            filter: grayscale(15%) contrast(105%) sepia(10%);
        }

        .map-thumbnail iframe {
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* Finalize Tab Styles */
        #finalize-view {
            display: none;
            background: var(--card-bg);
            border: 2px solid var(--text-main);
            padding: 30px;
            box-shadow: var(--block-shadow);
        }

        #finalize-view.active {
            display: block;
            animation: slideFadeIn 0.5s forwards;
        }

        .export-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--text-main);
            padding-bottom: 20px;
        }

        .download-btn {
            background: var(--primary);
            color: white;
            border: 2px solid var(--text-main);
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            font-family: 'Plus Jakarta Sans', sans-serif;
            cursor: pointer;
            box-shadow: 4px 4px 0px var(--text-main);
            transition: all 0.2s ease;
        }

        .download-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px var(--text-main);
        }

        /* Drag and Drop List */
        .itinerary-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .itinerary-item {
            background: var(--bg-color);
            border: 2px solid var(--text-main);
            margin-bottom: 15px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: grab;
            transition: transform 0.2s;
        }

        .itinerary-item:active {
            cursor: grabbing;
        }

        .itinerary-item.dragging {
            opacity: 0.5;
            background: var(--accent-yellow);
        }

        .drag-handle {
            font-size: 1.5rem;
            color: var(--text-muted);
            cursor: grab;
        }
        
        .item-details h4 {
            margin: 0 0 5px 0;
            font-size: 1.1rem;
        }
        
        .item-details p {
            margin: 0;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .remove-btn {
            margin-left: auto;
            background: none;
            border: none;
            color: var(--primary);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-style: italic;
        }

        @media (max-width: 768px) {
            .tabs { flex-direction: column; }
            .tab-btn { border-right: none; border-bottom: 2px solid var(--text-main); }
            .export-header { flex-direction: column; gap: 15px; align-items: flex-start; }
        }
    </style>
</head>

// State Management
let selectedItems = new Set();
let currentCategory = 'Nature';

// DOM Elements
const gridView = document.getElementById('grid-view');
const finalizeView = document.getElementById('finalize-view');
const tabContainer = document.getElementById('tab-container');
const itineraryList = document.getElementById('itinerary-list');

// Initialize
document.addEventListener('DOMContentLoaded', () => {
    setupTabs();
    renderGrid(currentCategory);
});

function setupTabs() {
    tabContainer.addEventListener('click', (e) => {
        if (e.target.classList.contains('tab-btn')) {
            // Update active state
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            e.target.classList.add('active');
            
            const category = e.target.getAttribute('data-category');
            
            if (category === 'Finalize') {
                gridView.style.display = 'none';
                finalizeView.classList.add('active');
                renderFinalizeList();
            } else {
                finalizeView.classList.remove('active');
                gridView.style.display = 'grid';
                renderGrid(category);
            }
        }
    });
}

function renderGrid(category) {
    const filtered = attractions.filter(a => a.cat === category);
    
    gridView.innerHTML = filtered.map(item => {
        const isSelected = selectedItems.has(item.id);
        const icon = isSelected ? '✓' : '+';
        const cardClass = isSelected ? 'card selected' : 'card';
        
        return `
            <div class="${cardClass}" id="card-${item.id}">
                <div class="card-header">
                    <h3>${item.name}</h3>
                    <button class="add-btn" onclick="toggleItem('${item.id}')">${icon}</button>
                </div>
                <p>${item.desc}</p>
                <div class="map-thumbnail">
                    <iframe src="http://googleusercontent.com/maps.google.com/${item.map}" loading="lazy" allowfullscreen></iframe>
                </div>
            </div>
        `;
    }).join('');
}

function toggleItem(id) {
    if (selectedItems.has(id)) {
        selectedItems.delete(id);
    } else {
        selectedItems.add(id);
    }
    
    // Update button and card styling immediately without re-rendering whole grid
    const card = document.getElementById(`card-${id}`);
    if (card) {
        const btn = card.querySelector('.add-btn');
        if (selectedItems.has(id)) {
            card.classList.add('selected');
            btn.innerHTML = '✓';
        } else {
            card.classList.remove('selected');
            btn.innerHTML = '+';
        }
    }
}

function removeItem(id) {
    selectedItems.delete(id);
    renderFinalizeList();
}

// Drag and Drop implementation
let dragSrcEl = null;

function renderFinalizeList() {
    if (selectedItems.size === 0) {
        itineraryList.innerHTML = '<div class="empty-state">Your itinerary is empty. Go back and add some stops!</div>';
        return;
    }
    
    // Build list from selected IDs
    // Note: We maintain order based on how they are in the Set, but allow reordering
    let html = '';
    selectedItems.forEach(id => {
        const item = attractions.find(a => a.id === id);
        html += `
            <li class="itinerary-item" draggable="true" data-id="${item.id}">
                <div class="drag-handle">☰</div>
                <div class="item-details">
                    <h4>${item.name} <small>(${item.cat})</small></h4>
                    <p>${item.desc}</p>
                </div>
                <button class="remove-btn" onclick="removeItem('${item.id}')">✕</button>
            </li>
        `;
    });
    
    itineraryList.innerHTML = html;
    addDragAndDropHandlers();
}

function addDragAndDropHandlers() {
    const items = document.querySelectorAll('.itinerary-item');
    items.forEach(item => {
        item.addEventListener('dragstart', handleDragStart);
        item.addEventListener('dragover', handleDragOver);
        item.addEventListener('drop', handleDrop);
        item.addEventListener('dragend', handleDragEnd);
    });
}

function handleDragStart(e) {
    dragSrcEl = this;
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/html', this.outerHTML);
    this.classList.add('dragging');
}

function handleDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    return false;
}

function handleDrop(e) {
    e.stopPropagation();
    if (dragSrcEl !== this) {
        // Swap elements in the DOM
        const list = document.getElementById('itinerary-list');
        const itemsArray = Array.from(list.children);
        const srcIndex = itemsArray.indexOf(dragSrcEl);
        const dropIndex = itemsArray.indexOf(this);
        
        if (srcIndex < dropIndex) {
            this.parentNode.insertBefore(dragSrcEl, this.nextSibling);
        } else {
            this.parentNode.insertBefore(dragSrcEl, this);
        }
        
        // Re-sync the Set to preserve order if needed later
        syncSetWithDOM();
    }
    return false;
}

function handleDragEnd(e) {
    this.classList.remove('dragging');
}

function syncSetWithDOM() {
    const items = document.querySelectorAll('.itinerary-item');
    const newSet = new Set();
    items.forEach(item => {
        newSet.add(item.getAttribute('data-id'));
    });
    selectedItems = newSet;
}

// Download Implementation via html2canvas
function downloadItinerary() {
    const element = document.getElementById('finalize-view');
    const btn = document.querySelector('.download-btn');
    
    // Temporarily hide buttons for a clean export
    btn.style.display = 'none';
    document.querySelectorAll('.remove-btn').forEach(el => el.style.display = 'none');
    document.querySelectorAll('.drag-handle').forEach(el => el.style.display = 'none');
    
    html2canvas(element, {
        backgroundColor: '#fdfbf7', // Match bg color
        scale: 2 // High-res
    }).then(canvas => {
        // Restore buttons
        btn.style.display = 'block';
        document.querySelectorAll('.remove-btn').forEach(el => el.style.display = 'block');
        document.querySelectorAll('.drag-handle').forEach(el => el.style.display = 'block');
        
        // Trigger download
        const link = document.createElement('a');
        link.download = 'Tokyo-Itinerary.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    });
}
</script>

</body>
</html>
